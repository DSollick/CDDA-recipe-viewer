name: Nightly build & deploy

on:
  push:
    branches: [main, develop]
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:        # allow manual trigger from the Actions tab

# Pages deployment requires these permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python package
        run: pip install -e .

      - name: Run pipeline (vanilla + innawood)
        run: python -m builder --out site/public/graph.json

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install JS deps
        run: npm ci
        working-directory: site

      - name: Build static site
        run: npm run build
        working-directory: site
        env:
          VITE_BASE_URL: /CDDA-recipe-viewer/
          VITE_DEPLOY_SHA: ${{ github.sha }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
